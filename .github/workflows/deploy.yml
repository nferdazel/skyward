name: Build Flutter Web and Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil source code dari repo private lu
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java environment (wajib buat Flutter SDK)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter SDK versi stable terbaru (plus otomatis nge-cache)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.1'
          cache: true

      # 4. Ambil semua dependencies pubspec.yaml lu
      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env

      - name: Generate envied bindings
        run: dart run build_runner build

      - name: Run Tests
        run: flutter test

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Copy Vercel Config Files
        run: cp vercel.json build/web/vercel.json

      - name: Inject Supabase URL into Vercel config
        run: |
          sed -i "s|https://YOUR_SUPABASE.supabase.co|${{ secrets.SUPABASE_URL }}|g" build/web/vercel.json
          sed -i "s|wss://YOUR_SUPABASE.supabase.co|$(echo '${{ secrets.SUPABASE_URL }}' | sed 's|https://|wss://|g')|g" build/web/vercel.json
          sed -i "s|https://YOUR_SUPABASE_MAPS|https://*.basemaps.cartocdn.com|g" build/web/vercel.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} \
            --project ${{ secrets.VERCEL_PROJECT_ID }} \
            --scope ${{ secrets.VERCEL_ORG_ID }} \
            --yes ./build/web
